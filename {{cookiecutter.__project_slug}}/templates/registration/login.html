{% load widget_tweaks %}
<c-base.default>
    <div class="flex pt-12 items-start justify-center">
        <div class="w-full max-w-md">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                {% if form.non_field_errors %}
                    <div class="p-3 mb-4 text-sm text-red-500 bg-red-100 rounded-md border border-red-200">
                        {{ form.non_field_errors }}
                    </div>
                {% endif %}
                <c-fancy.form.field :field="form.username" label="Username" />
                <c-fancy.form.field :field="form.password" label="Password" />
                <div class="flex justify-end gap-3 pt-4">
                    <div class="relative mt-4">
                        <button type="submit"
                                class="cursor-pointer inline-flex items-center justify-center px-6 py-2.5 font-medium text-sm transition-all duration-200 shadow-md active:shadow-inner active:scale-95 focus:outline-none bg-neutral-500 text-white hover:bg-neutral-600 active:bg-neutral-800 dark:bg-neutral-700 dark:text-neutral-100 dark:hover:bg-neutral-800 dark:active:bg-neutral-950">
                            Go
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</c-base.default>
