<div x-show="formShown"
     x-cloak
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-100 flex items-center justify-center backdrop-blur-md bg-surface-dark/20 dark:bg-black/40"
     @click.self="formShown = false">
    <div class="relative w-full max-w-sm p-8 mx-4 overflow-hidden border border-outline bg-surface shadow-2xl dark:bg-surface-dark dark:border-outline-dark"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0">
        {{ slot }}
        <button @click="formShown = false"
                class="absolute top-4 right-4 p-2 text-on-surface-variant hover:bg-surface-alt dark:hover:bg-surface-dark-alt rounded-full transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>
</div>
