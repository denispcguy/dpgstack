<div x-data="{ open: false }" class="relative inline-block">
    <button @click="open = !open"
            type="button"
            class="flex items-center justify-center w-8 h-8 text-xl font-black hover:bg-gray-100 dark:hover:bg-gray-800 transition-all active:scale-95 cursor-pointer"
            :class="{ 'bg-gray-100 dark:bg-gray-800': open }">
        <span class="leading-none mb-1">…</span>
    </button>
    <div x-show="open"
         x-transition:enter="transition ease-out duration-100"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-75"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         @click.outside="open = false"
         class="absolute left-0 mt-2 w-56 origin-top-left bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-700 shadow-2xl z-50 overflow-hidden"
         style="display: none">
        <div class="py-1.5 flex flex-col">{{ slot }}</div>
    </div>
</div>
