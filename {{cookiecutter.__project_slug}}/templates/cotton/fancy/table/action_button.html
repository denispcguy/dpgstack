<button {{ attrs }}
        hx-target="closest tr"
        hx-swap="outerHTML swap:500ms"
        @click="open = false"
        class="group flex items-center w-full px-3 py-2 text-sm font-medium transition-colors cursor-pointer text-gray-600 hover:bg-gray-50 dark:text-gray-400 dark:hover:bg-gray-950/30">
    <span class="flex-1 text-left">{{ text }}</span>
    <span class="opacity-0 group-hover:opacity-100 transition-opacity text-xs">→</span>
</button>
