<div x-data="{ showSidebar: false }"
     class="relative flex w-full flex-col md:flex-row">
    <a class="sr-only" href="#main-content">skip to the main content</a>
    <div x-cloak
         x-show="showSidebar"
         class="fixed inset-0 z-10 bg-surface-dark/10 backdrop-blur-xs md:hidden"
         aria-hidden="true"
         x-on:click="showSidebar = false"
         x-transition.opacity></div>
    <nav class="fixed left-0 z-20 flex h-svh w-60 shrink-0 flex-col border-r border-outline bg-surface-alt p-4 transition-transform duration-300 md:w-64 md:translate-x-0 md:relative dark:border-outline-dark dark:bg-surface-dark-alt"
         x-bind:class="showSidebar ? 'translate-x-0' : '-translate-x-60'"
         aria-label="sidebar navigation">
        <div hx-boost="true" class="flex flex-col gap-2 overflow-y-auto pb-6">
            <c-fancy.sidebar.piece name="Books" view="my_app:thought">
                <svg xmlns="http://www.w3.org"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke-width="1.5"
                     stroke="currentColor"
                     class="size-5 shrink-0">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6c0-3.313-2.687-6-6-6s-6 2.687-6 6a6 6 0 0 0 6 6Z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 2.25V4.5m6.364.386-1.591 1.591M21.75 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.236-1.591 1.591M2.25 12h2.25m.386-6.364 1.591 1.591" />
                </svg>
            </c-fancy.sidebar.piece>
            <c-fancy.sidebar.piece name="Authors" view="my_app:project">
                <svg xmlns="http://www.w3.org"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke-width="1.5"
                     stroke="currentColor"
                     class="size-5 shrink-0">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-19.5 0A2.25 2.25 0 0 0 4.5 15h15a2.25 2.25 0 0 0 2.25-2.25m-19.5 0v.75A2.25 2.25 0 0 0 4.5 18h15a2.25 2.25 0 0 0 2.25-2.25V12.75m-19.5 0h19.5" />
                </svg>
            </c-fancy.sidebar.piece>
        </div>
    </nav>
    <div id="main-content"
         class="h-svh w-full p-4 bg-surface dark:bg-surface-dark">{{ slot }}</div>
    <button class="fixed right-4 top-4 z-20 rounded-full bg-primary p-4 md:hidden text-on-primary dark:bg-primary-dark dark:text-on-primary-dark"
            x-on:click="showSidebar = ! showSidebar">
        <svg x-show="showSidebar"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 16 16"
             fill="currentColor"
             class="size-5"
             aria-hidden="true">
            <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z" />
        </svg>
        <svg x-show="! showSidebar"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 16 16"
             fill="currentColor"
             class="size-5"
             aria-hidden="true">
            <path d="M0 3a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm5-1v12h9a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1zM4 2H2a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h2z" />
        </svg>
        <span class="sr-only">sidebar toggle</span>
    </button>
</div>
