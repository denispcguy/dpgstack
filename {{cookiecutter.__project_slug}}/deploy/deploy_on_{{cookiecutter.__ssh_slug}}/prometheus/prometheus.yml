global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node_exporter
    static_configs:
      - targets:
          - node_exporter:9100

  - job_name: postgres_exporter
    static_configs:
      - targets:
          - postgres_exporter:9187

  - job_name: django_exporter
    static_configs:
      - targets:
          - django:8000