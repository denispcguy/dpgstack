jenkins:
  systemMessage: "Welcome to JCasC!"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  disableRememberMe: false

unclassified:
  location:
    url: "http://localhost:8080/"

jobs:
  - script: >
      multibranchPipelineJob('docker-compose-restart') {
        description('Auto-restart docker-compose on any push to local repo')
        branchSources {
          git {
            id('my-unique-id')
            remote('file:///root/projects/bare_repos/{{cookiecutter.__project_slug}}_bare_repo')
            includes('*')
          }
        }
        factory {
          workflowBranchProjectFactory {
            scriptPath('deploy/deploy_on_{{cookiecutter.__ssh_slug}}/jenkins/Jenkinsfile')
          }
        }
        triggers {
          periodicFolderTrigger {
            interval('1m')
          }
        }
      }
